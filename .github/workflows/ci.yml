name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        exclude:
          # Run Windows on 3.11 and 3.12 only to keep CI time reasonable
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.13"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint (ruff)
        run: poetry run ruff check src tests examples scripts

      - name: Type check (mypy)
        run: poetry run mypy src

      - name: Unit tests (push - integration tests skipped)
        if: github.event_name == 'push'
        run: poetry run pytest -m "not integration"

      - name: Full test suite including integration tests (pull request)
        if: github.event_name == 'pull_request'
        run: poetry run pytest

      - name: Benchmark (Linux Python 3.12 only)
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: poetry run python -m aac.benchmarks.benchmark_engine | tee benchmark_results.txt

      - name: Upload benchmark results
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_results.txt
          retention-days: 90