name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        exclude:
          # Run Windows on 3.11 and 3.12 only to keep CI time reasonable
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.13"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pipx install poetry

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Version consistency check
        run: python scripts/check_version.py

      - name: Lint (ruff)
        run: poetry run ruff check src tests examples scripts

      - name: Type check (mypy)
        run: poetry run mypy src

      - name: Unit tests (push - integration + perf tests skipped)
        if: github.event_name == 'push'
        run: poetry run pytest -m "not integration" --ignore=tests/test_performance_regression.py --ignore=tests/test_property_based.py

      - name: Full test suite including integration tests (pull request)
        if: github.event_name == 'pull_request'
        run: poetry run pytest

      # Performance regression gate: runs separately from the unit test suite
      # so a regression produces a clearly labelled CI failure, not a buried
      # test failure in the general pytest output. The test itself lives at
      # tests/test_performance_regression.py and enforces p99 < 5ms (stateless)
      # and p99 < 30ms (production) - both roughly 15–20× the measured values,
      # so this catches catastrophic regressions without being fragile.
      - name: Performance regression tests
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: poetry run pytest tests/test_performance_regression.py -v

      # Benchmark: report numbers to CI log and artifact for trend tracking.
      # This is informational only - failures here do not block merge.
      # Hard latency gates are enforced by the regression tests above.
      - name: Benchmark (numbers only - informational)
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: poetry run python -m aac.benchmarks.benchmark_engine | tee benchmark_results.txt

      - name: Upload benchmark results
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmark_results.txt
          retention-days: 90
