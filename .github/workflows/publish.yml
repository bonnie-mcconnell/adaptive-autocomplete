name: Publish to PyPI

# Trigger: push a tag like v0.9.0 to main
# This workflow builds the package and publishes to PyPI using trusted publishing
# (no API key needed - GitHub Actions OIDC token is used directly).
#
# Setup required once:
#   1. Go to https://pypi.org/manage/project/adaptive-autocomplete/settings/publishing/
#   2. Add a trusted publisher:
#      - Owner: bonnie-mcconnell
#      - Repository: adaptive-autocomplete
#      - Workflow: publish.yml
#      - Environment: release
#   3. Create a "release" environment in GitHub repo settings.
#
# Usage:
#   git tag v0.9.0
#   git push origin v0.9.0
#   → CI runs, tests pass, package publishes to PyPI automatically

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+a[0-9]+"   # alpha: v0.9.0a1
      - "v[0-9]+.[0-9]+.[0-9]+b[0-9]+"   # beta:  v0.9.0b1
      - "v[0-9]+.[0-9]+.[0-9]+rc[0-9]+"  # RC:    v0.9.0rc1

jobs:
  # ── Run full test suite before publishing ──────────────────────────────────
  test:
    name: Tests (Python 3.12, ubuntu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint
        run: poetry run ruff check src tests

      - name: Type check
        run: poetry run mypy src

      - name: Tests
        run: poetry run pytest -m "not integration" --no-cov

  # ── Build and publish ──────────────────────────────────────────────────────
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    needs: test  # only publish if tests pass
    environment: release

    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PYPROJECT_VERSION=$(poetry version --short)
          echo "Tag version: $TAG"
          echo "pyproject.toml version: $PYPROJECT_VERSION"
          if [ "$TAG" != "$PYPROJECT_VERSION" ]; then
            echo "ERROR: Tag v$TAG does not match pyproject.toml version $PYPROJECT_VERSION"
            echo "Update pyproject.toml with: poetry version $TAG"
            exit 1
          fi

      - name: Verify __init__.py version matches pyproject.toml
        run: python scripts/check_version.py

      - name: Build wheel and sdist
        run: poetry build

      - name: Verify built packages
        run: |
          ls -la dist/
          pip install twine
          twine check dist/*

      - name: Publish to PyPI (trusted publishing - no API key needed)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            Install from PyPI:
            ```
            pip install adaptive-autocomplete==${{ github.ref_name }}
            ```

            See [CHANGELOG.md](CHANGELOG.md) for what changed.
